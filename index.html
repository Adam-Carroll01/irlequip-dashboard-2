<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Irlequip Workshop Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;font-size:13px;color:#111;background:#F2F3F5;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
input:focus,textarea:focus,select:focus{border-color:#C8102E!important;box-shadow:0 0 0 3px rgba(200,16,46,.1);outline:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}
.jcard{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:14px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;}
.jcard:hover{border-color:#C8102E;box-shadow:0 4px 14px rgba(200,16,46,.12);transform:translateY(-1px);}
.kpi{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 18px;cursor:pointer;position:relative;overflow:hidden;transition:box-shadow .2s,border-color .2s;}
.kpi:hover,.kpi.on{box-shadow:0 4px 16px rgba(0,0,0,.09);border-color:#C8102E;}
.vtab{background:transparent;border:none;color:#6B7280;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.vtab.on{background:#C8102E;color:#fff;}
.mtab{background:transparent;border:none;border-bottom:2px solid transparent;color:#9CA3AF;font-size:13px;font-weight:700;padding:10px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s,border-color .15s;}
.mtab.on{border-bottom-color:#C8102E;color:#fff;}
.mtab:hover:not(.on){color:#D1D5DB;}
@keyframes spin{to{transform:rotate(360deg)}}
.cal-pill{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:2px;cursor:pointer;border-left:3px solid transparent;}
.cal-pill:hover{filter:brightness(.92);}
.cp-scheduled{background:#DBEEFF;color:#0A3D8F;border-left-color:#1A73E8;}
.cp-diagnosis{background:#FFF8D6;color:#6B4C00;border-left-color:#FFB800;}
.cp-in-progress{background:#FFF0D6;color:#7A3200;border-left-color:#FF6B00;}
.cp-completed{background:#D6F5E3;color:#0A4D2A;border-left-color:#00B248;}
.cp-waiting{background:#FFD6D6;color:#7A0000;border-left-color:#E50000;}
.cp-other{background:#F3F4F6;color:#374151;border-left-color:#9CA3AF;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PROXY="";
const BOARD_ID="qEvYkGds";
const R="#C8102E",B="#111",W="#fff",LG="#F8F9FB",MG="#E5E7EB";
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const STATUS_STYLES={
  "scheduled":         {label:"Scheduled",         bg:"#DBEEFF",color:"#0A3D8F",border:"#5BA4F5",dot:"#1A73E8"},
  "diagnosis":         {label:"Diagnosis",          bg:"#FFF8D6",color:"#6B4C00",border:"#FFD93D",dot:"#FFB800"},
  "in progress":       {label:"In Progress",        bg:"#FFF0D6",color:"#7A3200",border:"#FF9A3C",dot:"#FF6B00"},
  "completed":         {label:"Completed",          bg:"#D6F5E3",color:"#0A4D2A",border:"#34D27A",dot:"#00B248"},
  "waiting for parts": {label:"Waiting for Parts",  bg:"#FFD6D6",color:"#7A0000",border:"#FF5C5C",dot:"#E50000"},
};
const PIE_C={
  "scheduled":"#1A73E8","diagnosis":"#FFB800","in progress":"#FF6B00",
  "completed":"#00B248","waiting for parts":"#E50000","other":"#9CA3AF",
};
const PRIO={
  high:{label:"High",bg:"#FEF2F2",color:"#B91C1C",border:"#FECACA"},
  medium:{label:"Medium",bg:"#FFFBEB",color:"#92400E",border:"#FDE68A"},
  low:{label:"Low",bg:"#F9FAFB",color:"#374151",border:"#E5E7EB"},
};
const CAL_CLASS={
  "scheduled":"cp-scheduled","diagnosis":"cp-diagnosis","in progress":"cp-in-progress",
  "completed":"cp-completed","waiting for parts":"cp-waiting",
};

const statusKey=n=>{
  if(!n)return"other";
  const l=n.toLowerCase().trim();
  if(l.includes("waiting")||l.includes("parts")||l.includes("on hold"))return"waiting for parts";
  if(l.includes("diagnosis"))return"diagnosis";
  for(const k of Object.keys(STATUS_STYLES))if(l.includes(k))return k;
  return"other";
};
const statusObj=k=>STATUS_STYLES[k]||{label:k||"Other",bg:"#F9FAFB",color:"#6B7280",border:"#E5E7EB",dot:"#9CA3AF"};
const prioFromLabels=ls=>{
  if(!ls?.length)return"medium";
  const ns=ls.map(l=>(l.name||l.color||"").toLowerCase());
  if(ns.some(n=>n.includes("high")||n==="red"))return"high";
  if(ns.some(n=>n.includes("low")||n==="blue"))return"low";
  return"medium";
};

const tGet=async p=>{const r=await fetch(`/trello/${p}`);if(!r.ok)throw new Error(await r.text());return r.json();};
const tPost=async(p,b)=>{const r=await fetch(`/trello/${p}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();};
const tPut=async(p,b)=>{const r=await fetch(`/trello/${p}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();};

const cardToJob=(card,lists)=>{
  const list=lists.find(l=>l.id===card.idList);
  const sk=statusKey(list?.name||"");
  const due=card.due?card.due.split("T")[0]:null;
  const startDate=card.start?card.start.split("T")[0]:null;
  const lines=(card.desc||"").split("\n");
  const getLine=prefix=>lines.find(l=>new RegExp(`^${prefix}:`,"i").test(l))?.replace(new RegExp(`^${prefix}:\\s*`,"i"),"").trim()||"";
  const machine=getLine("Machine");
  const brand=getLine("Brand");
  const technician=getLine("Technician");
  const partsReady=getLine("PartsReady");
  const notes=lines.filter(l=>!/^(Machine|Brand|Technician|PartsReady):/i.test(l)).join("\n").trim();
  return{id:card.id,jobNo:card.name.match(/^([A-Z]{2,}-\d+)/)?.[1]||"",title:card.name.replace(/^[A-Z]{2,}-\d+\s*/,"").trim()||card.name,machine,brand,notes,technician,partsReady,start:startDate||due||new Date().toISOString().split("T")[0],end:due||new Date().toISOString().split("T")[0],status:sk,listId:card.idList,listName:list?.name||"",priority:prioFromLabels(card.labels),labels:card.labels||[],parts:(card.checklists||[]).flatMap(cl=>cl.checkItems?.map(ci=>({id:ci.id,checklistId:cl.id,name:ci.name,checked:ci.state==="complete"}))||[]),trelloUrl:card.shortUrl};
};

const buildDesc=form=>{
  const lines=[];
  if(form.machine)lines.push(`Machine: ${form.machine}`);
  if(form.brand)lines.push(`Brand: ${form.brand}`);
  if(form.technician)lines.push(`Technician: ${form.technician}`);
  if(form.partsReady)lines.push(`PartsReady: ${form.partsReady}`);
  if(form.notes)lines.push("",form.notes);
  return lines.join("\n").trim();
};

async function applyPartsLabel(cardId,partsReady){
  if(!partsReady)return;
  try{
    // Map to specific label names — never match by colour so priority labels are never touched
    const nameMap={yes:"Parts Ready",partially:"Parts Partial",no:"Parts Unavailable"};
    const targetName=nameMap[partsReady];
    if(!targetName)return;
    const bl=await tGet(`boards/${BOARD_ID}/labels`);
    // Only consider labels whose name contains "Parts"
    const partsLabelIds=bl.filter(l=>(l.name||"").toLowerCase().includes("parts")).map(l=>l.id);
    const liveCard=await tGet(`cards/${cardId}?fields=idLabels`);
    const liveIds=(liveCard.idLabels||[]);
    const toRemove=partsLabelIds.filter(id=>liveIds.includes(id));
    for(const id of toRemove){
      try{await fetch(`/trello/cards/${cardId}/idLabels/${id}`,{method:"DELETE"});}catch(_){}
      await new Promise(res=>setTimeout(res,200));
    }
    // Find the target label by name; create it if missing
    let target=bl.find(l=>(l.name||"").toLowerCase()===targetName.toLowerCase());
    if(!target){
      const colorMap={"Parts Ready":"green","Parts Partial":"orange","Parts Unavailable":"red"};
      try{target=await tPost(`boards/${BOARD_ID}/labels`,{name:targetName,color:colorMap[targetName]||"orange"});}catch(_){}
    }
    if(target)await tPost(`cards/${cardId}/idLabels`,{value:target.id});
  }catch(e){console.warn("applyPartsLabel failed:",e.message);}
}

let state={jobs:[],lists:[],loading:true,error:"",tab:"jobs",view:"board",filter:"all",syncing:false,lastSync:null,modal:null};
const setState=patch=>{state={...state,...patch};render();};

async function loadBoard(quiet=false){
  if(!quiet)setState({loading:true,error:""});else setState({syncing:true});
  try{
    const[lists,cards]=await Promise.all([
      tGet(`boards/${BOARD_ID}/lists?fields=id,name`),
      tGet(`boards/${BOARD_ID}/cards?checklists=all&fields=id,name,desc,idList,due,start,labels,shortUrl,closed&filter=open`),
    ]);
    setState({lists,jobs:cards.map(c=>cardToJob(c,lists)),loading:false,syncing:false,lastSync:new Date()});
  }catch(e){setState({error:e.message,loading:false,syncing:false});}
}

const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of(Array.isArray(children)?children:[children])){
    if(c==null)continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
};
const badge=(text,bg,color,border)=>h("span",{style:{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,border:`1px solid ${border}`,background:bg,color,display:"inline-flex",alignItems:"center",gap:4}},[text]);

function section(title,children){
  const wrap=h("div",{});
  wrap.appendChild(h("div",{style:{fontSize:10,fontWeight:800,letterSpacing:".1em",textTransform:"uppercase",color:R,borderBottom:`2px solid ${R}20`,paddingBottom:5,marginBottom:10}},[title]));
  children.forEach(c=>wrap.appendChild(c));
  return wrap;
}

function renderModal(){
  const{modal,lists}=state;
  if(!modal)return null;
  const isNew=!modal.id;
  let form={...modal};
  const overlay=h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:50,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"24px 16px",overflowY:"auto"}});
  overlay.addEventListener("click",e=>{if(e.target===overlay)setState({modal:null});});
  const box=h("div",{style:{background:W,borderRadius:10,width:"100%",maxWidth:580,boxShadow:"0 24px 64px rgba(0,0,0,.35)"}});
  const inp={width:"100%",padding:"8px 11px",background:LG,border:`1.5px solid ${MG}`,color:B,fontFamily:"'DM Sans',sans-serif",fontSize:13,borderRadius:6,boxSizing:"border-box"};
  const field=(label,input)=>h("div",{},[h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:"#6B7280",marginBottom:4}},[label]),input]);
  const textInput=(key,val,placeholder="")=>{const el=h("input",{style:inp,value:val||"",placeholder});el.addEventListener("input",e=>{form[key]=e.target.value;});return el;};
  const dateInput=(key,val)=>{const el=h("input",{style:inp,type:"date",value:val||""});el.addEventListener("input",e=>{form[key]=e.target.value;});return el;};
  box.appendChild(h("div",{style:{background:B,borderRadius:"10px 10px 0 0",padding:"18px 22px",display:"flex",justifyContent:"space-between",alignItems:"center"}},[
    h("div",{},[
      h("div",{style:{fontSize:11,fontWeight:700,color:R,letterSpacing:"2px"}},[isNew?"NEW TRELLO CARD":"EDIT TRELLO CARD"]),
      h("div",{style:{fontSize:16,fontWeight:800,color:W,marginTop:2}},[isNew?"New Work Order":form.title]),
    ]),
    h("button",{style:{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",color:W,width:32,height:32,borderRadius:6,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>setState({modal:null})},["×"]),
  ]));
  const body=h("div",{style:{padding:22,display:"grid",gap:16,maxHeight:"65vh",overflowY:"auto"}});
  const g2=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}});
  g2.appendChild(field("Job Number",textInput("jobNo",form.jobNo,"IRL-0001")));
  g2.appendChild(field("Title",textInput("title",form.title,"e.g. Annual Inspection")));
  body.appendChild(section("Job Details",[g2]));
  const g2b=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}});
  g2b.appendChild(field("Machine Model",textInput("machine",form.machine)));
  g2b.appendChild(field("Brand",textInput("brand",form.brand)));
  body.appendChild(section("Machine",[g2b]));
  const g3=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}});
  const listSel=h("select",{style:inp});
  lists.forEach(l=>{const o=h("option",{value:l.id},[l.name]);if(l.id===form.listId)o.selected=true;listSel.appendChild(o);});
  listSel.addEventListener("change",e=>{form.listId=e.target.value;form.status=statusKey(lists.find(l=>l.id===e.target.value)?.name||"");});
  g3.appendChild(field("Trello List",listSel));
  g3.appendChild(field("Start",dateInput("start",form.start)));
  g3.appendChild(field("Due Date",dateInput("end",form.end)));
  const techRow=h("div",{style:{marginTop:12}});
  techRow.appendChild(field("Technician",textInput("technician",form.technician,"e.g. John Murphy")));
  body.appendChild(section("Scheduling",[g3,techRow]));
  const partsSel=h("select",{style:inp});
  [{value:"",label:"— Select —"},{value:"yes",label:"Yes — All parts are available"},{value:"partially",label:"Partially — Some parts are available"},{value:"no",label:"No — Parts are not yet available"}].forEach(({value,label})=>{
    const o=h("option",{value},[label]);
    if((form.partsReady||"")===value)o.selected=true;
    partsSel.appendChild(o);
  });
  partsSel.addEventListener("change",e=>{form.partsReady=e.target.value;});
  body.appendChild(section("Parts",[field("Parts Availability",partsSel)]));
  const ta=h("textarea",{style:{...inp,resize:"vertical"},rows:3,placeholder:"Fault description, safety notes…"});
  ta.value=form.notes||"";ta.addEventListener("input",e=>{form.notes=e.target.value;});
  body.appendChild(section("Notes",[ta]));
  const errDiv=h("div",{style:{display:"none",background:"#FEF2F2",border:"1px solid #FECACA",color:"#B91C1C",padding:"10px 14px",borderRadius:6,fontSize:12}});
  body.appendChild(errDiv);
  box.appendChild(body);
  const saveBtn=h("button",{style:{background:R,color:W,border:"none",padding:"9px 22px",fontSize:13,fontWeight:800,cursor:"pointer",borderRadius:6,fontFamily:"'DM Sans',sans-serif"}},[isNew?"Create in Trello":"Save to Trello"]);
  saveBtn.addEventListener("click",async()=>{
    if(!form.title)return;
    saveBtn.textContent="Saving…";saveBtn.disabled=true;
    try{
      const desc=buildDesc(form);
      const waitingList=lists.find(l=>statusKey(l.name)==="waiting for parts");
      const targetList=(["no","partially"].includes(form.partsReady)&&waitingList)
        ?waitingList
        :(lists.find(l=>l.id===form.listId)||lists[0]);
      const cardName=`${form.jobNo?form.jobNo+" ":""}${form.title}`;
      if(isNew){
        const card=await tPost(`cards`,{idList:targetList.id,name:cardName,desc,due:form.end?form.end+"T12:00:00.000Z":null,start:form.start?form.start+"T12:00:00.000Z":null});
        setState({jobs:[...state.jobs,cardToJob({...card,checklists:[]},lists)],modal:null});
        applyPartsLabel(card.id,form.partsReady);
      }else{
        await tPut(`cards/${form.id}`,{name:cardName,desc,idList:targetList.id,due:form.end?form.end+"T12:00:00.000Z":null,start:form.start?form.start+"T12:00:00.000Z":null});
        const updatedJob={...form,listId:targetList.id,listName:targetList.name,status:statusKey(targetList.name)};
        setState({jobs:state.jobs.map(j=>j.id===form.id?updatedJob:j),modal:null});
        applyPartsLabel(form.id,form.partsReady);
      }
    }catch(e){errDiv.textContent="Error: "+e.message;errDiv.style.display="block";saveBtn.textContent=isNew?"Create in Trello":"Save to Trello";saveBtn.disabled=false;}
  });
  const footer=h("div",{style:{padding:"14px 22px",display:"flex",justifyContent:"space-between",gap:10,borderTop:`1px solid ${MG}`}});
  if(!isNew){
    const archBtn=h("button",{style:{background:W,border:"1.5px solid #FECACA",color:"#B91C1C",padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer",borderRadius:6,fontFamily:"'DM Sans',sans-serif"}},["Archive"]);
    archBtn.addEventListener("click",async()=>{
      if(!confirm("Archive this card on Trello?"))return;
      try{await tPut(`cards/${form.id}`,{closed:true});setState({jobs:state.jobs.filter(j=>j.id!==form.id),modal:null});}
      catch(e){errDiv.textContent="Error: "+e.message;errDiv.style.display="block";}
    });
    footer.appendChild(archBtn);
  }
  footer.appendChild(h("div",{style:{display:"flex",gap:10,marginLeft:"auto"}},[
    h("button",{style:{background:LG,border:`1.5px solid ${MG}`,color:"#6B7280",padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer",borderRadius:6,fontFamily:"'DM Sans',sans-serif"},onClick:()=>setState({modal:null})},["Cancel"]),
    saveBtn,
  ]));
  box.appendChild(footer);
  overlay.appendChild(box);
  return overlay;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const{jobs,lists,loading,error,tab,view,filter,syncing,lastSync,modal}=state;
  if(loading){
    app.appendChild(h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}},[
      h("div",{style:{width:48,height:48,border:`4px solid ${MG}`,borderTopColor:R,borderRadius:"50%",animation:"spin .8s linear infinite"}}),
      h("div",{style:{fontSize:14,color:"#9CA3AF",fontWeight:600}},["Loading Trello board…"]),
    ]));
    return;
  }
  if(error){
    app.appendChild(h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12,padding:24}},[
      h("div",{style:{fontSize:32}},["⚠️"]),
      h("div",{style:{fontSize:15,fontWeight:800}},["Could not load Trello board"]),
      h("div",{style:{fontSize:12,color:"#6B7280",maxWidth:400,background:W,padding:16,borderRadius:8,border:`1px solid ${MG}`}},[error]),
      h("button",{style:{background:R,color:W,border:"none",padding:"10px 24px",fontSize:13,fontWeight:700,borderRadius:6,cursor:"pointer"},onClick:()=>loadBoard()},["↻ Retry"]),
    ]));
    return;
  }
  const filtered=jobs.filter(j=>filter==="all"||j.status===filter);
  const counts=Object.fromEntries([...Object.keys(STATUS_STYLES),"other"].map(s=>[s,jobs.filter(j=>j.status===s).length]));
  const header=h("div",{style:{background:B,height:62,display:"flex",alignItems:"center",padding:"0 24px",gap:14,position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 12px rgba(0,0,0,.3)"}});
  header.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:10}},[
    h("div",{style:{background:R,color:W,fontSize:11,fontWeight:900,padding:"6px 11px",letterSpacing:"2px",textTransform:"uppercase",clipPath:"polygon(0 0,100% 0,100% 68%,91% 100%,0 100%)"}},["Irlequip"]),
    h("div",{},[
      h("div",{style:{color:W,fontSize:15,fontWeight:800,letterSpacing:"-.3px",lineHeight:1}},["Workshop Scheduler"]),
      h("div",{style:{color:"#9CA3AF",fontSize:10,fontWeight:500,marginTop:2,letterSpacing:".5px",textTransform:"uppercase"}},["Live · Trello Sync"]),
    ]),
  ]));
  header.appendChild(h("div",{style:{width:1,height:28,background:"rgba(255,255,255,.12)"}}));
  [["jobs","Work Orders"],["calendar","Calendar"],["techs","Technicians"]].forEach(([k,l])=>{
    header.appendChild(h("button",{class:`mtab${tab===k?" on":""}`,onClick:()=>setState({tab:k})},[l]));
  });
  header.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:6,padding:"4px 10px"}},[
    h("span",{style:{width:7,height:7,borderRadius:"50%",background:syncing?"#F59E0B":"#22C55E",boxShadow:`0 0 6px ${syncing?"#F59E0B":"#22C55E"}`}}),
    h("span",{style:{fontSize:10,fontWeight:600,color:"#9CA3AF",letterSpacing:".05em"}},[syncing?"SYNCING…":"TRELLO LIVE"]),
  ]));
  if(lastSync)header.appendChild(h("span",{style:{fontSize:10,color:"#4B5563"}},["Synced "+lastSync.toLocaleTimeString()]));
  header.appendChild(h("button",{style:{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:"#9CA3AF",padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer",borderRadius:5},onClick:()=>loadBoard(true)},["↻ Refresh"]));
  header.appendChild(h("button",{style:{marginLeft:"auto",background:R,color:W,border:"none",padding:"9px 18px",fontSize:12,fontWeight:800,borderRadius:4,cursor:"pointer"},onClick:()=>setState({modal:{title:"",machine:"",brand:"",notes:"",technician:"",partsReady:"",start:new Date().toISOString().split("T")[0],end:new Date().toISOString().split("T")[0],listId:lists[0]?.id||"",status:statusKey(lists[0]?.name||""),priority:"medium",labels:[],parts:[]}})},[h("span",[],["+ New Card"])]));
  app.appendChild(header);
  const content=h("div",{style:{padding:"20px 24px",maxWidth:1500,margin:"0 auto"}});
  const kpiRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr auto",gap:12,marginBottom:18}});
  Object.entries(STATUS_STYLES).forEach(([k,v])=>{
    const kpi=h("div",{class:`kpi${filter===k?" on":""}`,style:{background:v.bg,borderColor:v.border},onClick:()=>setState({filter:filter===k?"all":k})},[
      h("div",{style:{position:"absolute",top:0,left:0,bottom:0,width:4,background:v.dot,borderRadius:"10px 0 0 10px"}}),
